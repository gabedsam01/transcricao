name: Build and Push Multi-Arch Docker Image

# Gatilhos do Workflow
on:
  push:
    branches:
      - main            # Roda automaticamente no push para a main
  workflow_dispatch:    # Permite rodar manualmente pela interface do GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout do código fonte
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar QEMU para suporte a múltiplas arquiteturas (emulação ARM64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Configurar Docker Buildx (necessário para builds multi-arch)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Login no Docker Hub usando secrets configurados no repositório
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build e Push da imagem multi-arquitetura
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Nome da imagem solicitado
          tags: gabedsam01/whisper-local-api:latest
          # Uso de cache do GitHub Actions (gha) para acelerar builds futuros
          cache-from: type=gha
          cache-to: type=gha,mode=max
